aid: national-gallery-of-art
name: National Gallery of Art
description: >-
  The National Gallery of Art is a national art museum in Washington, D.C.,
  located on the National Mall. The Gallery provides open access to images
  and data about its art collection through its Open Access program. While
  the Gallery does not publish a documented public REST API, it releases a
  comprehensive open dataset of more than 130,000 artworks and associated
  creators in CSV format under Creative Commons Zero licensing through its
  GitHub repository, with reconciled Wikidata Q-item identifiers for
  research interoperability.
